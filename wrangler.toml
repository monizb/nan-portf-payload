# yaml-language-server: $schema=https://raw.githubusercontent.com/cloudflare/workers-sdk/main/packages/wrangler/config-schema.json
name = "nanditha-portfolio"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
main = ".open-next/worker.js"
assets = { directory = ".open-next/assets", binding = "ASSETS" }

# Cloudflare D1 Database
[[d1_databases]]
binding = "DB"
database_name = "nanditha-portfolio-db"
database_id = "" # Fill after `wrangler d1 create nanditha-portfolio-db`

# Cloudflare R2 Bucket for media uploads
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "nanditha-portfolio-media"
# Create with: wrangler r2 bucket create nanditha-portfolio-media

[vars]
PAYLOAD_SECRET = "change-this-to-a-secure-secret-in-production"
NEXT_PUBLIC_SITE_URL = "https://nanditha.example.com"
