<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GLB Scroll Animation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: #D97757; overflow-x: hidden; }

    /* 500vh tall scroll runway — scrolling through this drives the animation */
    .scroll-section {
      height: 500vh;
      position: relative;
    }

    /* Fixed canvas pinned over viewport while user scrolls */
    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      z-index: 10;
      pointer-events: none;
    }

    /* Progress bar at bottom */
    #progress-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      height: 3px;
      background: #fff;
      z-index: 20;
      width: 0%;
      transition: none;
    }

    /* Scroll hint */
    #scroll-hint {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      background: rgba(10, 10, 10, 0.8);
      border-radius: 999px;
      padding: 0 24px;
      height: 40px;
      display: flex;
      align-items: center;
      opacity: 1;
      transition: opacity 0.6s ease;
    }
    #scroll-hint span {
      white-space: nowrap;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.13em;
      color: #fff;
      font-family: system-ui, sans-serif;
    }
  </style>

  <script async src="https://ga.jspm.io/npm:es-module-shims@1.8.0/dist/es-module-shims.js"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>

  <div class="scroll-section">
    <div id="canvas-container"></div>
  </div>
  <div id="progress-bar"></div>
  <div id="scroll-hint"><span>SCROLL TO ANIMATE</span></div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

    // ── Config ──────────────────────────────────────────────
    const isMobile = window.innerWidth < 768;
      const GLB_URL = './Sprint.glb';
    const TARGET_CAMERA = 'DutchCamera001';

    // ── Scroll state ────────────────────────────────────────
    const scrollSection = document.querySelector('.scroll-section');
    const stableVH = window.innerHeight;
    const sectionHeight = scrollSection.offsetHeight;
    const maxScroll = sectionHeight - stableVH;

    let targetProgress = 0;   // raw scroll 0→1
    let currentProgress = 0;  // smoothed scroll 0→1

    window.addEventListener('scroll', () => {
      targetProgress = Math.max(0, Math.min(1, window.scrollY / maxScroll));
    }, { passive: true });

    // ── Mouse tracking (parallax) ───────────────────────────
    const mouse = { x: 0, y: 0, tx: 0, ty: 0 };
    window.addEventListener('mousemove', (e) => {
      mouse.tx = (e.clientX / window.innerWidth) * 2 - 1;
      mouse.ty = -(e.clientY / window.innerHeight) * 2 + 1;
    }, { passive: true });
    window.addEventListener('mouseleave', () => { mouse.tx = 0; mouse.ty = 0; });

    // ── Three.js setup ──────────────────────────────────────
    const container = document.getElementById('canvas-container');
    const progressBar = document.getElementById('progress-bar');
    const scrollHint = document.getElementById('scroll-hint');

    const scene = new THREE.Scene();
      scene.background = new THREE.Color('#D97757');

    const renderer = new THREE.WebGLRenderer({
      antialias: !isMobile,
      powerPreference: isMobile ? 'low-power' : 'high-performance',
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, isMobile ? 1.0 : 1.5));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 0.75;
    container.appendChild(renderer.domElement);

    let camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    let mixer = null;
    let animationDuration = 0;
    let glbCamera = null;

    // ── Load GLB ────────────────────────────────────────────
    const dracoLoader = new DRACOLoader();
    dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');

    const loader = new GLTFLoader();
    loader.setDRACOLoader(dracoLoader);

    loader.load(GLB_URL, (gltf) => {
      scene.add(gltf.scene);

      // Find the baked camera from the GLB
      gltf.scene.traverse((child) => {
        if (child.name === TARGET_CAMERA || child.name.includes(TARGET_CAMERA)) {
          if (child.isCamera) {
            glbCamera = child;
          } else {
            child.traverse((sub) => { if (sub.isCamera) glbCamera = sub; });
          }
        }
        if (child.isCamera && !glbCamera) glbCamera = child;
        if (child.isMesh) {
          if (child.material) child.material.side = THREE.DoubleSide;
          child.frustumCulled = false;
        }
      });

      if (!glbCamera && gltf.cameras.length > 0) {
        glbCamera = gltf.cameras.find(c => c.name.includes(TARGET_CAMERA)) || gltf.cameras[0];
      }

      if (glbCamera) {
        glbCamera.aspect = window.innerWidth / window.innerHeight;
        glbCamera.near = 0.01;
        glbCamera.far = 1000;
        glbCamera.updateProjectionMatrix();
        camera = glbCamera;
      }

      // Set up AnimationMixer — all clips play once and clamp
      if (gltf.animations.length > 0) {
        mixer = new THREE.AnimationMixer(gltf.scene);
        gltf.animations.forEach((clip) => {
          const action = mixer.clipAction(clip);
          action.setLoop(THREE.LoopOnce);
          action.clampWhenFinished = true;
          action.play();
        });
        animationDuration = Math.max(...gltf.animations.map(a => a.duration));
      }

      // Hide scroll hint after a few seconds
      setTimeout(() => { if (scrollHint) scrollHint.style.opacity = '0'; }, 3000);
    });

    // ── Render loop ─────────────────────────────────────────
    const savedPos = new THREE.Vector3();
    const savedRot = new THREE.Euler();
    let lastTime = 0;

    function lerp(a, b, t) { return a + (b - a) * t; }

    function animate(time) {
      requestAnimationFrame(animate);

      // Throttle to ~60fps
      if (time - lastTime < 16) return;
      lastTime = time;

      // Smooth scroll progress
      currentProgress = lerp(currentProgress, targetProgress, 0.05);
      if (Math.abs(currentProgress - targetProgress) < 0.005) {
        currentProgress = targetProgress;
      }

      // Scrub all GLB animations to the scroll-mapped time
      if (mixer && animationDuration > 0) {
        const targetTime = Math.min(currentProgress * animationDuration, animationDuration - 0.01);
        mixer.setTime(targetTime);
        if (glbCamera) {
          glbCamera.near = 0.001;
          glbCamera.far = 1000;
          glbCamera.updateProjectionMatrix();
        }
      }

      // Save camera transform before parallax offset
      savedPos.copy(camera.position);
      savedRot.copy(camera.rotation);

      // Mouse parallax (desktop only)
      if (!isMobile && glbCamera && mixer) {
        mouse.x = lerp(mouse.x, mouse.tx, 0.06);
        mouse.y = lerp(mouse.y, mouse.ty, 0.06);

        const intensity = lerp(0.2, 1.4, Math.min(currentProgress / 0.3, 1.0));
        camera.position.x += mouse.x * intensity;
        camera.position.y += mouse.y * 0.15;
        camera.position.y = Math.min(camera.position.y, 0.6);
        camera.rotation.y -= mouse.x * 0.04;
      }

      // Mobile camera offset
      if (isMobile) {
        camera.position.x += 0.35;
      }

      // Update progress bar
      if (progressBar) progressBar.style.width = `${currentProgress * 100}%`;

      renderer.render(scene, camera);

      // Restore camera so animation data stays clean
      camera.position.copy(savedPos);
      camera.rotation.copy(savedRot);
    }

    animate(0);

    // ── Resize handling ─────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
